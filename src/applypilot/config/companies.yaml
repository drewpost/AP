# Observability / Monitoring company registry for ATS career page scraping.
# Each entry maps to a public job board API (Greenhouse, Lever, Ashby, or Workday).
#
# ATS types and their APIs:
#   greenhouse  → GET boards-api.greenhouse.io/v1/boards/{board_token}/jobs
#   lever       → GET api.lever.co/v0/postings/{company_slug}?mode=json
#   ashby       → POST api.ashbyhq.com/posting-api/job-board/{org_slug}
#   workday     → uses existing workday.py (define workday_key matching employers.yaml)

companies:

