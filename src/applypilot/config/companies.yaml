# Company registry for ATS career page scraping.
# Only verified board tokens/slugs — all tested and returning valid responses.
#
# ATS types and their APIs:
#   greenhouse  → GET boards-api.greenhouse.io/v1/boards/{board_token}/jobs
#   lever       → GET api.lever.co/v0/postings/{company_slug}?mode=json
#   ashby       → GET api.ashbyhq.com/posting-api/job-board/{org_slug}
#
# Title filtering: jobs are filtered to product management roles in ats.py
# Last verified: 2026-03-11

