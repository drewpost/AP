<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ApplyPilot{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% block head %}{% endblock %}
</head>
<body>
  <header class="top-bar">
    <div class="top-left">
      <div class="logo">ApplyPilot</div>
      <nav class="main-nav">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Jobs</a>
        <a href="/tracker" class="nav-link {% if request.path == '/tracker' %}active{% endif %}">Tracker</a>
      </nav>
    </div>
    <div class="top-actions">
      <span id="worker-badge" class="badge badge-dim">Worker: idle</span>
      <button id="btn-discover" class="btn btn-sm" onclick="triggerDiscover()">Scan Now</button>
      <button id="btn-log-toggle" class="btn btn-sm btn-log-toggle" onclick="toggleLogPanel()">Log</button>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <div id="log-panel" class="log-panel">
    <div class="log-header">
      <span class="log-title">Scan Log</span>
      <div class="log-actions">
        <button class="btn btn-sm" onclick="clearLogPanel()">Clear</button>
        <button class="btn btn-sm" onclick="toggleLogPanel()">&times;</button>
      </div>
    </div>
    <div id="log-output" class="log-output"></div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
